apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: microservices
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 20220796/microservices-frontend:latest
          ports:
            - containerPort: 3000

          env:
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:8000"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:4000/orders"
            - name: MOVIE_SERVICE_URL
              value: "http://movies-service:8082/api/v1"
          imagePullPolicy: Always
