
name: build and deploy microservices

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker auth-service image
        run: docker build ./auth-service -t 20220796/microservices-auth-service:${{ vars.APP_VERSION }} -t 20220796/microservices-auth-service:${{ github.sha }}

      - name: Build Docker frontend image
        run: docker build ./frontend -t 20220796/microservices-frontend:${{ vars.APP_VERSION }} -t 20220796/microservices-frontend:${{ github.sha }}

      - name: Build Docker movies-service image
        run: docker build ./movies-service -t 20220796/microservices-movies-service:${{ vars.APP_VERSION }} -t 20220796/microservices-movies-service:${{ github.sha }}

      - name: Build Docker order-service image
        run: docker build ./order-service -t 20220796/microservices-order-service:${{ vars.APP_VERSION }} -t 20220796/microservices-order-service:${{ github.sha }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker auth-service image
        run: |
          docker push 20220796/microservices-auth-service:${{ vars.APP_VERSION }}
          docker push 20220796/microservices-auth-service:${{ github.sha }}

      - name: Push Docker microservices-frontend image
        run: |
          docker push 20220796/microservices-frontend:${{ vars.APP_VERSION }}
          docker push 20220796/microservices-frontend:${{ github.sha }}

      - name: Push Docker microservices-movies-service image
        run: |
          docker push 20220796/microservices-movies-service:${{ vars.APP_VERSION }}
          docker push 20220796/microservices-movies-service:${{ github.sha }}

      - name: Push Docker microservices-order-service image
        run: |
          docker push 20220796/microservices-order-service:${{ vars.APP_VERSION }}
          docker push 20220796/microservices-order-service:${{ github.sha }}

  deploy-kube:
    runs-on: ubuntu-latest
    needs: [build-publish]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          printf "%s" "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Set environment variables
        run: |
          export MOVIE_API_URL="${{ secrets.MOVIE_API_URL }}"
          export CORS_ORIGINS="${{ secrets.CORS_ORIGINS }}"
          export API_TOKEN="${{ secrets.API_TOKEN }}"
          export API_KEY="${{ secrets.API_KEY }}"
          export SECRET_KEY="${{ secrets.SECRET_KEY }}"
          export ALGORITHM="${{ secrets.ALGORITHM }}"
          export POSTGRES_DB="${{ secrets.POSTGRES_DB }}"
          export POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
          export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"

      - name: Render secrets templates
        run: |
          mkdir -p k8s/rendered/secrets
          for file in k8s/secrets/*.yaml; do
            envsubst < "$file" > "k8s/rendered/secrets/$(basename $file)"
          done

          # Copier les autres manifests tels quels
          cp -r k8s/auth k8s/rendered/
          cp -r k8s/frontend k8s/rendered/
          cp -r k8s/ingress k8s/rendered/
          cp -r k8s/movies k8s/rendered/
          cp -r k8s/order k8s/rendered/
          cp -r k8s/postgres k8s/rendered/

      - name: Apply all manifests
        run: |
          kubectl apply -f k8s/rendered/
